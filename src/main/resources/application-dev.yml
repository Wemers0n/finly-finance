spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/finly_finance_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    baseline-on-migrate: true
    out-of-order: true
