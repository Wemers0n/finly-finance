spring:
  datasource:
    url: ${URL_DATA_FINLY}
    username: ${USER_DATA_FINLY}
    password: ${PASS_DATA_FINLY}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      url: ${REDIS_URL}
#      host: ${REDIS_HOST}
#      port: ${REDIS_PORT}
#      password: ${REDIS_PASSWORD}

  cache:
    type: redis